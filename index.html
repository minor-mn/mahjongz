<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>麻雀点数・期待値計算</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: #ffffff;
      --ink: #241d16;
      --muted: #75695f;
      --line: #e4d7c8;
      --accent: #0c7c59;
      --accent-dark: #075f45;
      --accent-soft: #dff3eb;
      --danger: #b54747;
      --shadow: 0 18px 45px rgba(75, 54, 34, 0.13);
      --tile-shadow: 0 5px 11px rgba(60, 39, 20, 0.18);
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(12, 124, 89, 0.16), transparent 31rem),
        linear-gradient(135deg, #fbf7ef 0%, var(--bg) 58%, #efe2d2 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    .hero {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-dark);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.1rem);
      letter-spacing: -0.07em;
      line-height: 0.95;
    }

    .lead {
      max-width: 760px;
      margin: 2px 0 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(228, 215, 200, 0.9);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: clamp(16px, 3vw, 24px);
      backdrop-filter: blur(12px);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.12rem;
      letter-spacing: -0.03em;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
      gap: 10px;
      align-items: end;
    }

    .input-wrap {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: rgba(12, 124, 89, 0.65);
      box-shadow: 0 0 0 4px rgba(12, 124, 89, 0.12);
      background: #fff;
    }

    select {
      cursor: pointer;
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 18px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }

    .button {
      border: 0;
      border-radius: 14px;
      min-height: 48px;
      padding: 0 16px;
      background: var(--ink);
      color: #fffaf2;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      box-shadow: 0 9px 18px rgba(36, 29, 22, 0.16);
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(36, 29, 22, 0.19);
    }

    .button:active {
      transform: translateY(0);
    }

    .button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .hint,
    .error,
    .empty {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 12px;
      align-items: end;
    }

    .dora-field {
      grid-column: 1 / span 2;
    }

    .check-card {
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--ink);
      font-weight: 900;
      cursor: pointer;
    }

    .check-card input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .palette {
      display: grid;
      gap: 14px;
    }

    .palette-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .palette-head h2 {
      margin-bottom: 0;
    }

    .mode-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
    }

    .mode-button {
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      padding: 0 13px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .mode-button.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 14px rgba(12, 124, 89, 0.18);
    }

    .tile-group {
      display: grid;
      grid-template-columns: 4.4rem minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .group-name {
      color: var(--muted);
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .tile-row,
    .hand,
    .meld-list,
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .tile {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 42px;
      min-width: 42px;
      height: 66px;
      padding: 0;
      border: 0;
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
      filter: drop-shadow(var(--tile-shadow));
      transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
    }

    .tile:hover:not(:disabled) {
      transform: translateY(-3px);
      filter: drop-shadow(0 8px 14px rgba(60, 39, 20, 0.2));
    }

    .tile:disabled {
      cursor: not-allowed;
      opacity: 0.34;
      filter: grayscale(0.8);
    }

    .tile img {
      width: 33px;
      height: 59px;
      display: block;
      image-rendering: auto;
    }

    .tile .fallback {
      display: none;
      width: 33px;
      height: 59px;
      place-items: center;
      border-radius: 5px;
      border: 1px solid #d7c8b5;
      background: #fffdf8;
      font-weight: 900;
      font-size: 0.9rem;
      writing-mode: vertical-rl;
    }

    .tile.image-missing img {
      display: none;
    }

    .tile.image-missing .fallback {
      display: grid;
    }

    .badge {
      position: absolute;
      right: -2px;
      bottom: 0;
      display: grid;
      place-items: center;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 0.76rem;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(12, 124, 89, 0.22);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
    }

    .count {
      color: var(--accent-dark);
      font-weight: 900;
    }

    .summary {
      display: grid;
      grid-template-columns: minmax(170px, 0.55fr) minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .score-card {
      display: grid;
      align-content: center;
      gap: 9px;
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), #0a9270);
      color: white;
      min-height: 126px;
    }

    .score-label {
      font-weight: 800;
      opacity: 0.8;
      font-size: 0.86rem;
    }

    .score-value {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 950;
      line-height: 0.95;
      letter-spacing: -0.08em;
    }

    .score-sub {
      opacity: 0.9;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .note-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      padding: 16px;
      line-height: 1.75;
      color: var(--muted);
    }

    .zone-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .meld-zone {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.58);
      padding: 14px;
    }

    .dora-zone {
      margin-top: 14px;
    }

    .meld-zone h3 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      letter-spacing: -0.02em;
    }

    .meld-card {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(228, 215, 200, 0.95);
      border-radius: 16px;
      padding: 7px 10px;
      background: #fffdf8;
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(60, 39, 20, 0.07);
      font-weight: 900;
    }

    .meld-card:hover {
      border-color: rgba(181, 71, 71, 0.45);
    }

    .meld-label {
      color: var(--accent-dark);
      font-size: 0.83rem;
      white-space: nowrap;
    }

    .draft-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .result-table-wrap {
      overflow-x: auto;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.64);
    }

    .loading-card {
      min-height: 260px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.64);
      color: var(--muted);
      text-align: center;
    }

    .loading-card strong {
      display: block;
      color: var(--ink);
      font-size: 1.15rem;
    }

    .loading-card p {
      margin: 6px 0 0;
      line-height: 1.7;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(12, 124, 89, 0.16);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: loading-spin 0.85s linear infinite;
    }

    @keyframes loading-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-spinner {
        animation-duration: 1.8s;
      }
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(228, 215, 200, 0.82);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 0.83rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      background: rgba(255, 250, 242, 0.85);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    tr.best {
      background: rgba(12, 124, 89, 0.08);
    }

    .discard-cell,
    .wait-cell,
    .ukeire-count {
      white-space: nowrap;
      font-weight: 900;
    }

    .ukeire-button {
      border: 1px solid rgba(12, 124, 89, 0.2);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(223, 243, 235, 0.72);
      color: var(--accent-dark);
      font-weight: 950;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
    }

    .ukeire-button:hover,
    .ukeire-button:focus-visible {
      border-color: rgba(12, 124, 89, 0.5);
      background: var(--accent-soft);
      outline: none;
    }

    .ukeire-button:active {
      transform: translateY(1px);
    }

    body.drawer-open {
      overflow: hidden;
    }

    .acceptance-drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px 16px 0;
      background: rgba(36, 29, 22, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .acceptance-drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .acceptance-drawer {
      width: min(100%, 720px);
      max-height: min(78dvh, 680px);
      overflow-y: auto;
      padding: 10px clamp(16px, 4vw, 28px) 26px;
      border: 1px solid rgba(228, 215, 200, 0.95);
      border-bottom: 0;
      border-radius: 24px 24px 0 0;
      background: #fffdf8;
      box-shadow: 0 -18px 45px rgba(60, 39, 20, 0.22);
      transform: translateY(100%);
      transition: transform 0.24s ease;
    }

    .acceptance-drawer-backdrop.open .acceptance-drawer {
      transform: translateY(0);
    }

    .drawer-handle {
      width: 42px;
      height: 5px;
      margin: 0 auto 14px;
      border-radius: 999px;
      background: var(--line);
    }

    .drawer-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .drawer-header h3 {
      margin: 0;
      font-size: 1.16rem;
    }

    .drawer-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .drawer-close {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--ink);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
    }

    .drawer-close:hover,
    .drawer-close:focus-visible {
      border-color: rgba(181, 71, 71, 0.45);
      outline: none;
    }

    .acceptance-detail-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 9px;
    }

    .acceptance-detail-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 52px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.78);
    }

    .acceptance-detail-item .mini-tile {
      margin: 0;
      padding: 3px 6px 3px 4px;
      box-shadow: none;
    }

    .acceptance-detail-kind {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .acceptance-detail-empty {
      margin: 0;
      color: var(--muted);
    }

    @media (prefers-reduced-motion: reduce) {
      .ukeire-button,
      .acceptance-drawer-backdrop,
      .acceptance-drawer {
        transition: none;
      }
    }

    .mini-tile {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin: 2px 4px 2px 0;
      padding: 4px 8px 4px 5px;
      border: 1px solid rgba(228, 215, 200, 0.95);
      border-radius: 999px;
      background: #fffdf8;
      color: var(--ink);
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(60, 39, 20, 0.07);
    }

    .mini-tile img {
      width: 19px;
      height: 34px;
      object-fit: contain;
    }

    .mini-tile .fallback {
      width: 19px;
      height: 34px;
      display: none;
      place-items: center;
      border-radius: 3px;
      border: 1px solid #d7c8b5;
      background: white;
      font-size: 0.72rem;
    }

    .mini-tile.image-missing img {
      display: none;
    }

    .mini-tile.image-missing .fallback {
      display: grid;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 900;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
    }

    .points {
      display: block;
      color: var(--accent-dark);
      font-size: 1.25rem;
      font-weight: 950;
      line-height: 1.2;
      white-space: nowrap;
    }

    .method-detail {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .yaku-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .yaku-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(12, 124, 89, 0.18);
      background: rgba(223, 243, 235, 0.72);
      color: var(--accent-dark);
      padding: 4px 9px;
      font-weight: 900;
      font-size: 0.84rem;
      white-space: nowrap;
    }

    .limit-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--ink);
      color: #fffaf2;
      padding: 3px 8px;
      margin-left: 5px;
      font-size: 0.76rem;
      font-weight: 900;
      vertical-align: middle;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .toolbar,
      .summary,
      .settings-grid {
        grid-template-columns: 1fr;
      }

      .dora-field {
        grid-column: auto;
      }

      .button {
        width: 100%;
      }

      .tile-group {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .palette-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .mode-switch {
        width: 100%;
      }

      .mode-button {
        flex: 1;
      }

      .zone-grid {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Mahjong EV</p>
      <h1>最適打牌</h1>
      <p class="lead">テンパイ形13枚を作ると各和了時の点数を、シャンテン形14枚を作ると打牌ごとの受け入れ枚数と期待得点を表示します。</p>
    </header>

    <div class="grid">
      <section class="panel" aria-labelledby="input-title">
        <h2 id="input-title">手牌入力</h2>
        <div class="toolbar">
          <div class="input-wrap">
            <label for="notation">文字で入力</label>
            <input id="notation" type="text" autocomplete="off" spellcheck="false" placeholder="例: 123m123p123s45s33z / 東南西北白發中">
          </div>
          <button class="button" id="apply-notation" type="button">反映</button>
          <button class="button secondary" id="sample-hand" type="button">例題</button>
          <button class="button secondary" id="clear-hand" type="button">クリア</button>
        </div>
        <p class="hint">表記: m=萬子、p=筒子、s=索子、z=字牌。字牌は 1z=東 2z=南 3z=西 4z=北 5z=白 6z=發 7z=中。赤5は 0m / 0p / 0s です。例題は任意の2シャンテンを生成します。</p>
        <p class="error" id="input-error" role="alert" hidden></p>
      </section>

      <section class="panel" aria-labelledby="settings-title">
        <div class="section-head">
          <h2 id="settings-title">計算条件</h2>
          <button class="button secondary" id="copy-permalink" type="button">リンクをコピー</button>
        </div>
        <div class="settings-grid">
          <div class="input-wrap">
            <label for="round-wind">場風</label>
            <select id="round-wind">
              <option value="27">東場</option>
              <option value="28">南場</option>
              <option value="29">西場</option>
              <option value="30">北場</option>
            </select>
          </div>
          <div class="input-wrap">
            <label for="seat-wind">自風</label>
            <select id="seat-wind">
              <option value="27">東家（親）</option>
              <option value="28" selected>南家（子）</option>
              <option value="29">西家（子）</option>
              <option value="30">北家（子）</option>
            </select>
          </div>
          <label class="check-card" for="riichi">
            <input id="riichi" type="checkbox">
            リーチ済み
          </label>
        </div>
      </section>

      <section class="panel" aria-labelledby="palette-title">
        <div class="palette-head">
          <h2 id="palette-title">牌をクリックして追加</h2>
          <div class="mode-switch" aria-label="入力先">
            <button class="mode-button active" type="button" data-mode="hand">手牌</button>
            <button class="mode-button" type="button" data-mode="open">副露</button>
            <button class="mode-button" type="button" data-mode="closedKan">暗槓</button>
            <button class="mode-button" type="button" data-mode="dora">ドラ表示牌</button>
          </div>
        </div>
        <div id="tile-palette" class="palette"></div>
      </section>

      <section class="panel" aria-labelledby="hand-title">
        <div class="section-head">
          <h2 id="hand-title">現在の手牌</h2>
          <div class="count"><span id="tile-count">0 / 13</span>枚</div>
        </div>
        <div id="hand-tiles" class="hand" aria-live="polite"></div>
        <div class="zone-grid">
          <div class="meld-zone">
            <h3>現在の副露</h3>
            <div id="open-melds" class="meld-list" aria-live="polite"></div>
          </div>
          <div class="meld-zone">
            <h3>現在の暗槓</h3>
            <div id="closed-kans" class="meld-list" aria-live="polite"></div>
          </div>
        </div>
        <div class="meld-zone dora-zone">
          <h3>現在のドラ表示牌</h3>
          <div id="dora-indicators" class="meld-list" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel" id="result" aria-live="polite"></section>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
