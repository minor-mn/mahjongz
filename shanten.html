<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>麻雀シャンテン・受け入れ計算</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: #ffffff;
      --ink: #241d16;
      --muted: #75695f;
      --line: #e4d7c8;
      --accent: #0c7c59;
      --accent-dark: #075f45;
      --accent-soft: #dff3eb;
      --danger: #b54747;
      --shadow: 0 18px 45px rgba(75, 54, 34, 0.13);
      --tile-shadow: 0 5px 11px rgba(60, 39, 20, 0.18);
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(12, 124, 89, 0.16), transparent 31rem),
        linear-gradient(135deg, #fbf7ef 0%, var(--bg) 58%, #efe2d2 100%);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    .hero {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-dark);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.1rem);
      letter-spacing: -0.07em;
      line-height: 0.95;
    }

    .lead {
      max-width: 760px;
      margin: 2px 0 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(228, 215, 200, 0.9);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: clamp(16px, 3vw, 24px);
      backdrop-filter: blur(12px);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.12rem;
      letter-spacing: -0.03em;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
      gap: 10px;
      align-items: end;
    }

    .input-wrap {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input[type="text"]:focus {
      border-color: rgba(12, 124, 89, 0.65);
      box-shadow: 0 0 0 4px rgba(12, 124, 89, 0.12);
      background: #fff;
    }

    .button {
      border: 0;
      border-radius: 14px;
      min-height: 48px;
      padding: 0 16px;
      background: var(--ink);
      color: #fffaf2;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      box-shadow: 0 9px 18px rgba(36, 29, 22, 0.16);
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(36, 29, 22, 0.19);
    }

    .button:active {
      transform: translateY(0);
    }

    .button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .hint,
    .error,
    .empty {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    .palette {
      display: grid;
      gap: 14px;
    }

    .tile-group {
      display: grid;
      grid-template-columns: 4.4rem minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .group-name {
      color: var(--muted);
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .tile-row,
    .hand,
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .tile {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 42px;
      min-width: 42px;
      height: 66px;
      padding: 0;
      border: 0;
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
      filter: drop-shadow(var(--tile-shadow));
      transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
    }

    .tile:hover:not(:disabled) {
      transform: translateY(-3px);
      filter: drop-shadow(0 8px 14px rgba(60, 39, 20, 0.2));
    }

    .tile:disabled {
      cursor: not-allowed;
      opacity: 0.34;
      filter: grayscale(0.8);
    }

    .tile img {
      width: 33px;
      height: 59px;
      display: block;
      image-rendering: auto;
    }

    .tile .fallback {
      display: none;
      width: 33px;
      height: 59px;
      place-items: center;
      border-radius: 5px;
      border: 1px solid #d7c8b5;
      background: #fffdf8;
      font-weight: 900;
      font-size: 0.9rem;
      writing-mode: vertical-rl;
    }

    .tile.image-missing img {
      display: none;
    }

    .tile.image-missing .fallback {
      display: grid;
    }

    .badge {
      position: absolute;
      right: -2px;
      bottom: 0;
      display: grid;
      place-items: center;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 0.76rem;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(12, 124, 89, 0.22);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }

    .count {
      color: var(--accent-dark);
      font-weight: 900;
    }

    .summary {
      display: grid;
      grid-template-columns: minmax(170px, 0.55fr) minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .score-card {
      display: grid;
      align-content: center;
      gap: 9px;
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), #0a9270);
      color: white;
      min-height: 126px;
    }

    .score-label {
      font-weight: 800;
      opacity: 0.8;
      font-size: 0.86rem;
    }

    .score-value {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 950;
      line-height: 0.95;
      letter-spacing: -0.08em;
    }

    .score-sub {
      opacity: 0.9;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .note-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      padding: 16px;
      line-height: 1.75;
      color: var(--muted);
    }

    .result-table-wrap {
      overflow-x: auto;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.64);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(228, 215, 200, 0.82);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 0.83rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      background: rgba(255, 250, 242, 0.85);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    tr.best {
      background: rgba(12, 124, 89, 0.08);
    }

    .discard-cell,
    .ukeire-count {
      white-space: nowrap;
      font-weight: 900;
    }

    .mini-tile {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin: 2px 4px 2px 0;
      padding: 4px 8px 4px 5px;
      border: 1px solid rgba(228, 215, 200, 0.95);
      border-radius: 999px;
      background: #fffdf8;
      color: var(--ink);
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(60, 39, 20, 0.07);
    }

    .mini-tile img {
      width: 19px;
      height: 34px;
      object-fit: contain;
    }

    .mini-tile .fallback {
      width: 19px;
      height: 34px;
      display: none;
      place-items: center;
      border-radius: 3px;
      border: 1px solid #d7c8b5;
      background: white;
      font-size: 0.72rem;
    }

    .mini-tile.image-missing img {
      display: none;
    }

    .mini-tile.image-missing .fallback {
      display: grid;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 900;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .toolbar,
      .summary {
        grid-template-columns: 1fr;
      }

      .button {
        width: 100%;
      }

      .tile-group {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Riichi Mahjong Helper</p>
      <h1>シャンテンと受け入れを一瞬で。</h1>
      <p class="lead">14枚の手牌を選ぶと、現在のシャンテン数と「何を切ると、シャンテンが進む受け入れが何枚あるか」を表示します。通常手・七対子・国士無双をまとめて判定します。</p>
    </header>

    <div class="grid">
      <section class="panel" aria-labelledby="input-title">
        <h2 id="input-title">手牌入力</h2>
        <div class="toolbar">
          <div class="input-wrap">
            <label for="notation">文字で入力</label>
            <input id="notation" type="text" autocomplete="off" spellcheck="false" placeholder="例: 123m456p789s11z55z / 東南西北白發中">
          </div>
          <button class="button" id="apply-notation" type="button">反映</button>
          <button class="button secondary" id="sample-hand" type="button">例題</button>
          <button class="button secondary" id="clear-hand" type="button">クリア</button>
        </div>
        <p class="hint">表記: m=萬子、p=筒子、s=索子、z=字牌。字牌は 1z=東 2z=南 3z=西 4z=北 5z=白 6z=發 7z=中。赤5は 0m/0p/0s と入力できます。</p>
        <p class="error" id="input-error" role="alert" hidden></p>
      </section>

      <section class="panel" aria-labelledby="palette-title">
        <h2 id="palette-title">牌をクリックして追加</h2>
        <div id="tile-palette" class="palette"></div>
      </section>

      <section class="panel" aria-labelledby="hand-title">
        <div class="section-head">
          <h2 id="hand-title">現在の手牌</h2>
          <div class="count"><span id="tile-count">0</span> / 14枚</div>
        </div>
        <div id="hand-tiles" class="hand" aria-live="polite"></div>
      </section>

      <section class="panel" id="result" aria-live="polite"></section>
    </div>
  </main>

  <script src="./shanten.js"></script>
</body>
</html>
